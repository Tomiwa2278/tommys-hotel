<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Tommy’s Hotel</title>
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--container-padding);
        }
        .error-content {
            max-width: 600px;
        }
        .error-number {
            font-family: var(--font-heading);
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 800;
            line-height: 1;
            color: var(--color-secondary);
            margin-bottom: 1rem;
            opacity: 0.8;
        }
        .error-title {
            font-size: var(--text-3xl);
            margin-bottom: 1.5rem;
        }
        .error-text {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Shared Navbar Component -->
    <div id="navbar-root"></div>

    <main class="error-page">
        <div class="error-content reveal">
            <div class="error-number">404</div>
            <h1 class="error-title">You've Wandered Off Path</h1>
            <p class="error-text">Even the best travelers lose their way sometimes. The page you are looking for doesn't exist or has been moved to a new sanctuary.</p>
            
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">Return to Home</a>
                <a href="rooms.html" class="btn btn-outline">Explore Our Rooms</a>
            </div>
        </div>
    </main>

    <!-- Shared Footer Placeholder -->
    <div id="footer-root"></div>

    <!-- JS Scripts -->
    <script src="js/navbar.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
